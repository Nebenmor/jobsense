# File: render.yaml
# Render uses this file to configure the backend service automatically.

services:
  - type: web
    name: jobsense-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — never committed
      - key: DATABASE_URL
        fromDatabase:
          name: jobsense-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: jobsense-db
    databaseName: jobsense
    user: jobsense